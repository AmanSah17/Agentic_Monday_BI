services:
  # The FastAPI Inference Hub
  - type: web
    name: founder-bi-backend
    env: docker
    dockerfilePath: ./founder_bi_agent/backend/Dockerfile
    plan: starter
    envVars:
      - key: LLM_PROVIDER
        value: huggingface
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: MONDAY_COM_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"

  # The Vite React UI Client
  - type: web
    name: founder-bi-frontend
    env: docker
    rootDir: founder_bi_agent/frontend
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: founder-bi-backend
          envVarKey: RENDER_EXTERNAL_URL
