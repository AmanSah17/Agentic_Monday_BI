services:
  # Singular Containerized Service (Hosts FastAPI Engine + Serves React Assets!)
  - type: web
    name: founder-bi-unified
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_SQL_MODEL
        value: gemini-2.0-flash
      - key: GOOGLE_API_KEY
        sync: false
      - key: MONDAY_COM_API_KEY
        sync: false
      - key: SILICON_FLOW_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
