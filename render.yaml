services:
  # Singular Consolidated Service (Hosts FastAPI Engine + Serves React Assets natively!)
  - type: web
    name: founder-bi-unified
    env: python
    buildCommand: ./build.sh
    startCommand: python -m uvicorn founder_bi_agent.backend.api:app --host 0.0.0.0 --port ${PORT:-8000}
    plan: starter
    envVars:
      - key: LLM_PROVIDER
        value: huggingface
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: MONDAY_COM_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
