databases:
  - name: agentic_bi_prod
    user: postgres
    plan: starter

services:
  # Redis Cache Service
  - type: redis
    name: agentic_bi_cache
    plan: starter
    ipAllowList: [] # Only allow internal connections

  # Unified Web Service (FastAPI + React)
  - type: web
    name: founder-bi-unified
    env: docker
    dockerfilePath: ./Dockerfile
    buildCommand: ./build.sh
    startCommand: python -m uvicorn founder_bi_agent.backend.main:app --host 0.0.0.0 --port ${PORT:-8000}
    plan: starter
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_SQL_MODEL
        value: gemini-2.0-flash
      - key: GOOGLE_API_KEY
        sync: false
      - key: MONDAY_COM_API_KEY
        sync: false
      - key: SILICON_FLOW_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: POSTGRES_URL
        fromDatabase:
          name: agentic_bi_prod
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: agentic_bi_cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: agentic_bi_cache
          property: port
      - key: ALLOWED_ORIGINS
        value: "*"
