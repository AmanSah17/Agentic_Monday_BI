services:
  # Singular Containerized Service (Hosts FastAPI Engine + Serves React Assets!)
  - type: web
    name: founder-bi-unified
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: LLM_PROVIDER
        value: huggingface
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: MONDAY_COM_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
